<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>School ERP - Chatbot Local Test</title>
<style>
  body { font-family: -apple-system, Segoe UI, Arial, sans-serif; max-width: 700px; margin: 30px auto; padding: 0 16px; background: #f4f5f7; }
  h2 { color: #1a1a2e; }
  .card { background: #fff; border-radius: 10px; padding: 18px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; margin-top: 10px; }
  input, select, button { width: 100%; padding: 9px; border-radius: 6px; border: 1px solid #ccc; font-size: 14px; box-sizing: border-box; }
  button { background: #2d6cdf; color: #fff; border: none; margin-top: 12px; cursor: pointer; font-weight: 600; }
  button:hover { background: #1f57bd; }
  button:disabled { background: #aaa; cursor: not-allowed; }
  #status { font-size: 13px; font-weight: 600; margin-top: 8px; }
  #chatBox { height: 340px; overflow-y: auto; border: 1px solid #ddd; border-radius: 8px; padding: 10px; background: #fafafa; margin-bottom: 10px; }
  .msg { margin: 6px 0; padding: 8px 12px; border-radius: 10px; max-width: 85%; white-space: pre-wrap; font-size: 14px; }
  .user { background: #2d6cdf; color: #fff; margin-left: auto; text-align: right; }
  .assistant { background: #e8e8ec; color: #222; }
  .system { background: transparent; color: #999; font-size: 12px; text-align: center; margin: 0 auto; }
  .row { display: flex; gap: 8px; }
  .row input { flex: 1; }
  .row button { width: auto; padding: 9px 16px; }
  #wsStatus { font-size: 12px; color: #666; margin-top: 6px; }
</style>
</head>
<body>

<h2>🏫 School ERP — Chatbot Local Test</h2>

<div class="card" id="loginCard">
  <b>Step 1 — Login</b>
  <label>Server base URL</label>
  <input id="baseUrl" value="http://127.0.0.1:8000">
  <label>Email</label>
  <input id="email" value="admin@demo.school">
  <label>Password</label>
  <input id="password" type="password" value="admin123">
  <button onclick="login()">Login</button>
  <div id="status"></div>
</div>

<div class="card" id="sessionCard" style="display:none">
  <b>Step 2 — Start a chat session</b>
  <button onclick="startSession()">Create Session + Connect</button>
  <div id="sessionStatus"></div>
  <div id="wsStatus"></div>
</div>

<div class="card" id="chatCard" style="display:none">
  <b>Step 3 — Chat</b>
  <div id="chatBox"></div>
  <div class="row">
    <input id="msgInput" placeholder="Type your question..." onkeydown="if(event.key==='Enter') sendMessage()">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
let accessToken = null;
let ws = null;
let sessionId = null;

function addMsg(role, text) {
  const box = document.getElementById('chatBox');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function setStatus(id, text, color = '#666') {
  const el = document.getElementById(id);
  if (el) { el.textContent = text; el.style.color = color; }
}

async function login() {
  const baseUrl = document.getElementById('baseUrl').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  setStatus('status', 'Logging in...', '#666');

  try {
    const res = await fetch(`${baseUrl}/api/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(JSON.stringify(data));

    accessToken = data.access;
    setStatus('status', '✅ Logged in successfully!', 'green');
    document.getElementById('sessionCard').style.display = 'block';
  } catch (err) {
    setStatus('status', '❌ Login failed: ' + err.message, 'red');
  }
}

async function startSession() {
  const baseUrl = document.getElementById('baseUrl').value.trim();
  setStatus('sessionStatus', 'Creating session...', '#666');
  setStatus('wsStatus', '');

  try {
    const res = await fetch(`${baseUrl}/api/chat/sessions`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${accessToken}`
      },
      body: JSON.stringify({})
    });
    const data = await res.json();
    if (!res.ok) throw new Error(JSON.stringify(data));

    sessionId = data.id || data.session_id;
    setStatus('sessionStatus', `✅ Session #${sessionId} created. Connecting WebSocket...`, 'green');
    connectWebSocket(baseUrl, sessionId);
  } catch (err) {
    setStatus('sessionStatus', '❌ Failed: ' + err.message, 'red');
  }
}

function connectWebSocket(baseUrl, sessionId) {
  const wsBase = baseUrl.replace('http://', 'ws://').replace('https://', 'wss://');
  const wsUrl = `${wsBase}/ws/chat/${sessionId}/?token=${accessToken}`;
  setStatus('wsStatus', '🔌 Connecting WebSocket...', '#666');

  ws = new WebSocket(wsUrl);

  ws.onopen = () => {
    setStatus('wsStatus', '✅ WebSocket connected!', 'green');
    document.getElementById('chatCard').style.display = 'block';
    addMsg('system', '✅ WebSocket connected');
  };

  ws.onmessage = (e) => {
    try {
      const data = JSON.parse(e.data);
      
      // ✅ Ignore ping messages (keep-alive)
      if (data.type === 'ping') {
        console.log('🔹 Received ping (ignored)');
        return;
      }

      if (data.type === 'message') {
        addMsg('assistant', data.content);
      } else if (data.type === 'error') {
        addMsg('system', '⚠️ Error: ' + data.error);
      } else if (data.type === 'typing') {
        addMsg('system', '...bot is thinking...');
      } else if (data.type === 'typing_status') {
        // Ignore
      }
    } catch (err) {
      console.error('Error parsing message:', err, e.data);
    }
  };

  ws.onclose = (e) => {
    setStatus('wsStatus', `❌ Connection closed (code: ${e.code}, reason: ${e.reason || 'No reason'})`, 'red');
    addMsg('system', `❌ Connection closed (code: ${e.code})`);
    document.getElementById('chatCard').style.display = 'none';
  };

  ws.onerror = (e) => {
    setStatus('wsStatus', '⚠️ WebSocket error — check console (F12)', 'red');
    addMsg('system', '⚠️ WebSocket error — check console (F12)');
    console.error('WebSocket error:', e);
  };
}

function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || !ws || ws.readyState !== WebSocket.OPEN) {
    alert('WebSocket not connected!');
    return;
  }

  addMsg('user', text);
  ws.send(JSON.stringify({ message: text }));
  input.value = '';
}
</script>

</body>
</html>
