<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>School ERP - Chatbot Local Test</title>
<style>
  body { font-family: -apple-system, Segoe UI, Arial, sans-serif; max-width: 700px; margin: 30px auto; padding: 0 16px; background: #f4f5f7; }
  h2 { color: #1a1a2e; }
  .card { background: #fff; border-radius: 10px; padding: 18px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; margin-top: 10px; }
  input, select, button { width: 100%; padding: 9px; border-radius: 6px; border: 1px solid #ccc; font-size: 14px; box-sizing: border-box; }
  button { background: #2d6cdf; color: #fff; border: none; margin-top: 12px; cursor: pointer; font-weight: 600; }
  button:hover { background: #1f57bd; }
  button:disabled { background: #aaa; cursor: not-allowed; }
  #status { font-size: 13px; font-weight: 600; margin-top: 8px; }
  #chatBox { height: 340px; overflow-y: auto; border: 1px solid #ddd; border-radius: 8px; padding: 10px; background: #fafafa; margin-bottom: 10px; }
  .msg { margin: 6px 0; padding: 8px 12px; border-radius: 10px; max-width: 85%; white-space: pre-wrap; font-size: 14px; }
  .user { background: #2d6cdf; color: #fff; margin-left: auto; text-align: right; }
  .assistant { background: #e8e8ec; color: #222; }
  .system { background: transparent; color: #999; font-size: 12px; text-align: center; margin: 0 auto; }
  .row { display: flex; gap: 8px; }
  .row input { flex: 1; }
  .row button { width: auto; padding: 9px 16px; }
</style>
</head>
<body>

<h2>🏫 School ERP — Chatbot Local Test</h2>

<div class="card" id="loginCard">
  <b>Step 1 — Login</b>
  <label>Server base URL</label>
  <input id="baseUrl" value="http://127.0.0.1:8000">
  <label>Email</label>
  <input id="email" placeholder="admin@example.com">
  <label>Password</label>
  <input id="password" type="password">
  <button onclick="login()">Login</button>
  <div id="status"></div>
</div>

<div class="card" id="sessionCard" style="display:none">
  <b>Step 2 — Start a bot session</b>
  <label>Choose bot</label>
  <select id="botType">
    <option value="fee">Fee Bot</option>
    <option value="attendance">Attendance Bot</option>
    <option value="assignment">Assignment Bot</option>
    <option value="exam">Exam Bot</option>
    <option value="certificate">Certificates Bot</option>
    <option value="scholarship">Scholarship Bot</option>
    <option value="inventory">Inventory Bot</option>
    <option value="event">Event Bot</option>
    <option value="maintenance">Maintenance Bot</option>
    <option value="media">Media Bot</option>
  </select>
  <button onclick="startSession()">Create Session + Connect</button>
  <div id="sessionStatus"></div>
</div>

<div class="card" id="chatCard" style="display:none">
  <b>Step 3 — Chat</b>
  <div id="chatBox"></div>
  <div class="row">
    <input id="msgInput" placeholder="Type your question..." onkeydown="if(event.key==='Enter') sendMessage()">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
let accessToken = null;
let ws = null;

function addMsg(role, text) {
  const box = document.getElementById('chatBox');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

async function login() {
  const baseUrl = document.getElementById('baseUrl').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const statusEl = document.getElementById('status');
  statusEl.textContent = 'Logging in...';
  statusEl.style.color = '#666';

  try {
    const res = await fetch(`${baseUrl}/api/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(JSON.stringify(data));

    accessToken = data.access;
    statusEl.textContent = '✅ Logged in';
    statusEl.style.color = 'green';
    document.getElementById('sessionCard').style.display = 'block';
  } catch (err) {
    statusEl.textContent = '❌ Login failed: ' + err.message;
    statusEl.style.color = 'red';
  }
}

async function startSession() {
  const baseUrl = document.getElementById('baseUrl').value.trim();
  const botType = document.getElementById('botType').value;
  const statusEl = document.getElementById('sessionStatus');
  statusEl.textContent = 'Creating session...';
  statusEl.style.color = '#666';

  try {
    const res = await fetch(`${baseUrl}/api/chat/sessions`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${accessToken}`
      },
      body: JSON.stringify({ bot_type: botType })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(JSON.stringify(data));

    const sessionId = data.id || data.session_id;
    statusEl.textContent = `✅ Session #${sessionId} created. Connecting WebSocket...`;
    statusEl.style.color = 'green';

    connectWebSocket(baseUrl, sessionId);
  } catch (err) {
    statusEl.textContent = '❌ Failed: ' + err.message;
    statusEl.style.color = 'red';
  }
}

function connectWebSocket(baseUrl, sessionId) {
  const wsBase = baseUrl.replace('http://', 'ws://').replace('https://', 'wss://');
  ws = new WebSocket(`${wsBase}/ws/chat/${sessionId}/?token=${accessToken}`);

  ws.onopen = () => {
    addMsg('system', '✅ WebSocket connected');
    document.getElementById('chatCard').style.display = 'block';
  };

  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.type === 'message') {
      addMsg('assistant', data.content);
    } else if (data.type === 'error') {
      addMsg('system', '⚠️ Error: ' + data.error);
    } else if (data.type === 'typing') {
      addMsg('system', '...bot is thinking...');
    }
  };

  ws.onclose = (e) => {
    addMsg('system', `❌ Connection closed (code ${e.code})`);
  };

  ws.onerror = () => {
    addMsg('system', '⚠️ WebSocket error — check console (F12) for details');
  };
}

function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

  addMsg('user', text);
  ws.send(JSON.stringify({ message: text }));
  input.value = '';
}
</script>

</body>
</html>
