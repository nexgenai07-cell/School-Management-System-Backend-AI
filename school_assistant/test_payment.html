<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stripe Test Payment - Local & Vercel</title>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: white;
            max-width: 500px;
            width: 100%;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #1a1a2e;
            margin-bottom: 5px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .env-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .env-selector label {
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }
        .env-btn {
            padding: 8px 16px;
            border: 2px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
            background: white;
            color: #333;
        }
        .env-btn:hover {
            border-color: #635bff;
        }
        .env-btn.active {
            border-color: #635bff;
            background: #635bff;
            color: white;
        }
        .env-btn.local-active {
            border-color: #28a745;
            background: #28a745;
            color: white;
        }
        .env-btn.vercel-active {
            border-color: #0070f3;
            background: #0070f3;
            color: white;
        }
        #current-env {
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 13px;
        }
        #current-env.local { background: #d4edda; color: #155724; }
        #current-env.vercel { background: #cce5ff; color: #004085; }
        
        #card-element {
            border: 2px solid #e0e0e0;
            padding: 14px;
            margin: 10px 0 20px;
            border-radius: 8px;
            background: #fafafa;
            transition: border-color 0.3s;
        }
        #card-element:hover { border-color: #635bff; }
        #card-element.StripeElement--focus { border-color: #635bff; }
        
        #pay-btn {
            padding: 14px 24px;
            background: #635bff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            font-weight: 600;
            width: 100%;
            transition: all 0.3s;
        }
        #pay-btn:hover { background: #4a3db8; transform: translateY(-1px); }
        #pay-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        #result {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: 500;
            display: none;
        }
        #result.show { display: block; }
        #result.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        #result.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        #result.info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        #result.loading { background: #e2e3e5; color: #383d41; border: 1px solid #d6d8db; }
        
        .token-status {
            margin: 10px 0;
            padding: 8px 12px;
            background: #fff3cd;
            border-radius: 6px;
            font-size: 13px;
            color: #856404;
            border: 1px solid #ffeeba;
            display: none;
        }
        .token-status.show { display: block; }
        .token-status.has-token { background: #d4edda; color: #155724; border-color: #c3e6cb; }
        
        .test-card-info {
            margin-top: 15px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
            font-size: 13px;
            color: #666;
            border: 1px dashed #ccc;
        }
        .test-card-info code {
            background: #e9ecef;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>💰 Test Payment</h2>
    <p class="subtitle">Toggle between Local &amp; Vercel environments</p>

    <!-- Environment Selector -->
    <div class="env-selector">
        <label>🌐 Environment:</label>
        <button id="env-local" class="env-btn active" onclick="switchEnv('local')">🖥️ Local</button>
        <button id="env-vercel" class="env-btn" onclick="switchEnv('vercel')">🚀 Vercel</button>
        <span id="current-env" class="local">local</span>
    </div>

    <!-- Token Status -->
    <div id="token-status" class="token-status">
        ℹ️ No token found. Enter one when prompted.
    </div>

    <!-- Card Element -->
    <div id="card-element"></div>

    <!-- Pay Button -->
    <button id="pay-btn" onclick="payNow()">💳 Pay Now</button>

    <!-- Result -->
    <div id="result"></div>

    <!-- Test Card Info -->
    <div class="test-card-info">
        <strong>🧪 Test Card:</strong>
        <code>4242 4242 4242 4242</code> &nbsp;|&nbsp;
        <code>12/28</code> &nbsp;|&nbsp;
        <code>123</code>
    </div>
</div>

<script>
    // ============================================================
    // CONFIGURATION
    // ============================================================
    const CONFIG = {
        stripePublishableKey: 'pk_test_51TfNwlFLblthg7AwL5L1az7fXQwWZdweqGz6w9YaMFvcIsDBe9DO8A2C8oKiplBY0KS4lO5d57afADnTx4enlsAP00awzPUQsH',
        endpoints: {
            local: 'http://127.0.0.1:8000',
            vercel: 'https://schoolassistant-neon.vercel.app'
        }
    };

    // ============================================================
    // STATE
    // ============================================================
    let currentEnv = 'local';
    let apiBaseUrl = CONFIG.endpoints.local;
    let accessToken = localStorage.getItem('access_token') || null;

    // ============================================================
    // STRIPE INIT
    // ============================================================
    const stripe = Stripe(CONFIG.stripePublishableKey);
    const elements = stripe.elements();
    const cardElement = elements.create('card', {
        style: {
            base: {
                fontSize: '16px',
                color: '#32325d',
                '::placeholder': { color: '#aab7c4' }
            }
        }
    });
    cardElement.mount('#card-element');

    // ============================================================
    // DOM REFS
    // ============================================================
    const payBtn = document.getElementById('pay-btn');
    const resultDiv = document.getElementById('result');
    const tokenStatus = document.getElementById('token-status');
    const envLocalBtn = document.getElementById('env-local');
    const envVercelBtn = document.getElementById('env-vercel');
    const currentEnvSpan = document.getElementById('current-env');

    // ============================================================
    // ENVIRONMENT SWITCH
    // ============================================================
    function switchEnv(env) {
        currentEnv = env;
        apiBaseUrl = CONFIG.endpoints[env];

        // Update buttons
        envLocalBtn.className = 'env-btn' + (env === 'local' ? ' local-active' : '');
        envVercelBtn.className = 'env-btn' + (env === 'vercel' ? ' vercel-active' : '');

        // Update env label
        currentEnvSpan.textContent = env;
        currentEnvSpan.className = env;

        // Clear token when switching (prevents confusion)
        accessToken = null;
        localStorage.removeItem('access_token');
        updateTokenStatus();

        // Show message
        showResult(`✅ Switched to ${env.charAt(0).toUpperCase() + env.slice(1)}`, 'info');
    }

    // ============================================================
    // TOKEN STATUS
    // ============================================================
    function updateTokenStatus() {
        if (accessToken) {
            tokenStatus.textContent = `✅ Token found! Environment: ${currentEnv}`;
            tokenStatus.className = 'token-status show has-token';
        } else {
            tokenStatus.textContent = `ℹ️ No token for ${currentEnv}. You'll be prompted to enter one.`;
            tokenStatus.className = 'token-status show';
        }
    }

    // ============================================================
    // RESULT DISPLAY
    // ============================================================
    function showResult(message, type = 'info') {
        resultDiv.textContent = message;
        resultDiv.className = 'show ' + type;
    }

    function hideResult() {
        resultDiv.className = '';
        resultDiv.textContent = '';
    }

    // ============================================================
    // PAYMENT FUNCTION
    // ============================================================
    async function payNow() {
        payBtn.disabled = true;
        payBtn.textContent = '⏳ Processing...';
        hideResult();
        showResult('⏳ Creating payment intent...', 'loading');

        try {
            // 1. Get token if not available
            if (!accessToken) {
                const tokenInput = prompt(
                    `🔑 Enter your Django access token for ${currentEnv}:\n\n` +
                    `(Get it from: ${apiBaseUrl}/api/auth/login)`
                );
                if (!tokenInput) {
                    throw new Error('❌ No token provided. Payment cancelled.');
                }
                accessToken = tokenInput.trim();
                localStorage.setItem('access_token', accessToken);
                updateTokenStatus();
            }

            // 2. Create payment intent
            const response = await fetch(`${apiBaseUrl}/api/finance/stripe/create-payment-intent`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + accessToken
                },
                body: JSON.stringify({ fee_id: 1 })
            });

            // 3. Handle auth errors
            if (response.status === 401 || response.status === 403) {
                localStorage.removeItem('access_token');
                accessToken = null;
                updateTokenStatus();
                throw new Error('❌ Token expired or invalid. Please refresh and try again.');
            }

            // 4. Parse response
            const data = await response.json();
            if (!response.ok) {
                throw new Error(data.detail || data.error || '❌ Failed to create payment intent');
            }

            // 5. Confirm payment
            showResult('⏳ Confirming payment...', 'loading');
            const { error, paymentIntent } = await stripe.confirmCardPayment(
                data.client_secret,
                {
                    payment_method: {
                        card: cardElement,
                        billing_details: {
                            name: 'Test User',
                            email: 'test@example.com'
                        }
                    }
                }
            );

            if (error) {
                throw new Error('❌ ' + error.message);
            }

            // 6. Success!
            if (paymentIntent.status === 'succeeded') {
                showResult('✅ Payment successful! Thank you! 💰', 'success');
            } else {
                showResult(`✅ Payment status: ${paymentIntent.status}`, 'success');
            }

        } catch (error) {
            console.error('Payment Error:', error);
            showResult(error.message || '❌ An unexpected error occurred', 'error');
        } finally {
            payBtn.disabled = false;
            payBtn.textContent = '💳 Pay Now';
        }
    }

    // ============================================================
    // INIT
    // ============================================================
    window.onload = function() {
        // Set default to local
        switchEnv('local');
        updateTokenStatus();
        showResult('🔄 Ready! Enter card details and click Pay Now.', 'info');
    };

    // Allow Enter key to trigger payment
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !payBtn.disabled) {
            payNow();
        }
    });
</script>

</body>
</html>
